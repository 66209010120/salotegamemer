<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Spin Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #FFD700;
  --gold2: #FFA500;
  --dark: #0d0d1a;
  --dark2: #16213e;
  --dark3: #1a0a2e;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,215,0,0.25);
}

body {
  font-family: 'Kanit', sans-serif;
  background: var(--dark);
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== BG ===== */
.bg-stars {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse at 20% 20%, rgba(83,74,183,0.15) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(255,165,0,0.1) 0%, transparent 50%),
              linear-gradient(135deg, #0d0d1a 0%, #16213e 50%, #0f3460 100%);
}

/* ===== PAGES ===== */
.page { display: none; position: relative; z-index: 1; }
.page.active { display: flex; }

/* ===== AUTH PAGE ===== */
#authPage {
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.auth-card {
  background: linear-gradient(160deg, rgba(45,27,105,0.9) 0%, rgba(13,13,26,0.95) 100%);
  border: 1.5px solid var(--border);
  border-radius: 24px;
  padding: 40px 36px;
  width: 100%;
  max-width: 420px;
  backdrop-filter: blur(20px);
  box-shadow: 0 0 60px rgba(255,215,0,0.08);
}

.auth-logo {
  text-align: center;
  margin-bottom: 28px;
}

.auth-logo .title {
  font-family: 'Orbitron', monospace;
  font-size: 26px;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 4px;
  text-shadow: 0 0 20px rgba(255,215,0,0.4);
}

.auth-logo .sub {
  font-size: 13px;
  color: rgba(255,215,0,0.5);
  letter-spacing: 2px;
  margin-top: 4px;
}

.tab-row {
  display: flex;
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 28px;
  border: 1px solid var(--border);
}

.tab-btn {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-family: 'Kanit', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 9px;
  transition: all 0.3s;
}

.tab-btn.active {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  color: #1a0a2e;
}

.auth-form { display: none; }
.auth-form.active { display: block; }

.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 13px;
  color: rgba(255,215,0,0.7);
  margin-bottom: 6px;
  font-weight: 600;
  letter-spacing: 1px;
}

.form-input {
  width: 100%;
  padding: 12px 16px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 10px;
  color: #fff;
  font-family: 'Kanit', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.3s;
}

.form-input:focus { border-color: rgba(255,215,0,0.6); }
.form-input::placeholder { color: rgba(255,255,255,0.25); }

.auth-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  border: none;
  border-radius: 12px;
  font-family: 'Orbitron', monospace;
  font-size: 15px;
  font-weight: 700;
  color: #1a0a2e;
  cursor: pointer;
  letter-spacing: 2px;
  margin-top: 8px;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(255,165,0,0.3);
}

.auth-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255,165,0,0.5); }
.auth-btn:active { transform: translateY(0); }

.auth-error {
  color: #ff6b6b;
  font-size: 13px;
  text-align: center;
  margin-top: 10px;
  min-height: 20px;
}

/* ===== MAIN GAME PAGE ===== */
#gamePage {
  flex-direction: column;
  min-height: 100vh;
}

/* NAVBAR */
.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: rgba(13,13,26,0.95);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.nav-logo {
  font-family: 'Orbitron', monospace;
  font-size: 16px;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 3px;
}

.nav-center {
  display: flex;
  gap: 8px;
}

.nav-btn {
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: rgba(255,255,255,0.6);
  font-family: 'Kanit', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

.nav-btn.active, .nav-btn:hover {
  background: rgba(255,215,0,0.1);
  color: var(--gold);
  border-color: rgba(255,215,0,0.5);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-coins {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,215,0,0.1);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
}

.nav-coins .coin-icon { font-size: 16px; }
.nav-coins .coin-val {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--gold);
}

.logout-btn {
  padding: 6px 14px;
  border: 1px solid rgba(255,100,100,0.3);
  border-radius: 8px;
  background: transparent;
  color: rgba(255,120,120,0.8);
  font-family: 'Kanit', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

.logout-btn:hover { background: rgba(255,100,100,0.1); color: #ff6b6b; }

/* CONTENT PANELS */
.panel { display: none; padding: 24px 20px; max-width: 500px; margin: 0 auto; width: 100%; }
.panel.active { display: block; }

/* ===== SLOT PANEL ===== */
.machine-title {
  font-family: 'Orbitron', monospace;
  font-size: 22px;
  font-weight: 900;
  color: var(--gold);
  text-align: center;
  letter-spacing: 3px;
  margin-bottom: 20px;
  text-shadow: 0 0 15px rgba(255,215,0,0.4);
}

.machine-body {
  background: linear-gradient(180deg, #2d1b69 0%, #1a0a2e 100%);
  border: 2px solid var(--gold);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 40px rgba(255,215,0,0.15), inset 0 0 20px rgba(0,0,0,0.5);
}

.stats-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.stat-card {
  flex: 1;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 10px;
  padding: 8px;
  text-align: center;
}

.stat-label {
  font-size: 11px;
  color: rgba(255,215,0,0.6);
  display: block;
  margin-bottom: 2px;
}

.stat-value {
  font-family: 'Orbitron', monospace;
  font-size: 15px;
  font-weight: 700;
  color: var(--gold);
}

.message-area {
  min-height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
}

.slot-message {
  font-size: 15px;
  font-weight: 600;
  text-align: center;
  padding: 5px 14px;
  border-radius: 20px;
}

.slot-message.win { color: var(--gold); background: rgba(255,215,0,0.12); animation: pulse 0.5s ease infinite alternate; }
.slot-message.lose { color: rgba(255,255,255,0.45); }
.slot-message.jackpot { color: var(--gold); font-size: 20px; animation: jackpot 0.3s ease infinite alternate; }

@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
@keyframes jackpot { from { transform: scale(1); text-shadow: 0 0 10px gold; } to { transform: scale(1.1); text-shadow: 0 0 30px gold; } }

.reels-container {
  display: flex;
  gap: 8px;
  background: #0d0d1a;
  border: 2px solid #333;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

.win-line {
  position: absolute; left: 0; right: 0;
  top: 50%; transform: translateY(-50%);
  height: 2px; background: rgba(255,215,0,0.25);
  pointer-events: none; z-index: 10;
}

.reel {
  flex: 1; height: 120px;
  background: #111;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  border: 1px solid #2a2a2a;
}

.reel-inner {
  position: absolute; width: 100%;
  display: flex; flex-direction: column; align-items: center;
}

.symbol {
  width: 100%; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}

.reel-overlay-top, .reel-overlay-bottom {
  position: absolute; left: 0; right: 0; height: 35px; z-index: 5; pointer-events: none;
}
.reel-overlay-top { top: 0; background: linear-gradient(to bottom, #111, transparent); }
.reel-overlay-bottom { bottom: 0; background: linear-gradient(to top, #111, transparent); }

.bet-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
}

.bet-label { font-size: 13px; color: rgba(255,215,0,0.7); white-space: nowrap; }

.bet-btn {
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 6px; color: var(--gold);
  font-family: 'Orbitron', monospace; font-size: 12px;
  padding: 5px 10px; cursor: pointer; transition: all 0.2s;
}
.bet-btn:hover { background: rgba(255,215,0,0.2); }

.bet-display {
  flex: 1; text-align: center;
  font-family: 'Orbitron', monospace;
  font-size: 18px; font-weight: 700; color: var(--gold);
}

.spin-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  border: none; border-radius: 12px;
  font-family: 'Orbitron', monospace;
  font-size: 17px; font-weight: 900; color: #1a0a2e;
  cursor: pointer; letter-spacing: 3px;
  box-shadow: 0 4px 20px rgba(255,165,0,0.35);
  transition: all 0.2s;
}
.spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255,165,0,0.6); }
.spin-btn:active:not(:disabled) { transform: translateY(0); }
.spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.paytable {
  margin-top: 16px;
}

.paytable-title {
  font-size: 12px; color: rgba(255,215,0,0.5);
  text-align: center; margin-bottom: 8px; letter-spacing: 2px;
}

.paytable-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
}

.pay-item {
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,215,0,0.15);
  border-radius: 8px; padding: 6px 4px; text-align: center;
}

.pay-sym { font-size: 18px; display: block; }
.pay-mult { font-family: 'Orbitron', monospace; font-size: 10px; color: var(--gold); }

/* ===== TOPUP PANEL ===== */
.topup-card {
  background: linear-gradient(160deg, rgba(45,27,105,0.6) 0%, rgba(13,13,26,0.8) 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}

.topup-card h3 {
  font-size: 14px; color: rgba(255,215,0,0.7);
  letter-spacing: 2px; margin-bottom: 16px;
  font-weight: 600;
}

.amount-input-wrap {
  display: flex; align-items: center;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: 10px; overflow: hidden;
}

.amount-prefix {
  padding: 12px 14px;
  color: rgba(255,215,0,0.6); font-size: 15px;
  border-right: 1px solid rgba(255,215,0,0.15);
  white-space: nowrap;
}

.amount-input {
  flex: 1; padding: 12px 14px;
  background: transparent; border: none;
  color: #fff; font-family: 'Orbitron', monospace;
  font-size: 18px; font-weight: 700; outline: none;
}

.amount-input::placeholder { color: rgba(255,255,255,0.2); font-size: 14px; font-family: 'Kanit'; font-weight: 400; }

.qr-section {
  text-align: center; margin: 16px 0;
}

.qr-box {
  display: inline-block;
  background: #fff;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
}

.qr-box canvas { display: block; }

.qr-label {
  font-size: 12px; color: rgba(255,255,255,0.5);
  margin-bottom: 4px;
}

.qr-amount {
  font-family: 'Orbitron', monospace;
  font-size: 22px; font-weight: 700; color: var(--gold);
}

.promptpay-info {
  font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px;
}

.confirm-btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  border: none; border-radius: 12px;
  font-family: 'Kanit', sans-serif;
  font-size: 16px; font-weight: 700; color: #fff;
  cursor: pointer; margin-top: 8px;
  transition: all 0.2s;
  box-shadow: 0 4px 15px rgba(34,197,94,0.3);
}
.confirm-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(34,197,94,0.45); }
.confirm-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* HISTORY */
.history-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }

.history-item {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; padding: 10px 14px;
}

.history-left .h-type { font-size: 13px; font-weight: 600; color: #fff; }
.history-left .h-date { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
.history-right { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; }
.history-right.plus { color: #22c55e; }
.history-right.minus { color: #ef4444; }

.empty-history {
  text-align: center; padding: 30px;
  color: rgba(255,255,255,0.25); font-size: 14px;
}

/* ===== WIN FLASH ===== */
.win-flash {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(255,215,0,0.1);
  pointer-events: none; opacity: 0;
  transition: opacity 0.3s;
}

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: rgba(34,197,94,0.95); color: #fff;
  padding: 12px 24px; border-radius: 50px;
  font-size: 14px; font-weight: 600;
  z-index: 999; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: rgba(239,68,68,0.95); }
</style>
</head>
<body>

<div class="bg-stars"></div>
<div class="win-flash" id="winFlash"></div>
<div class="toast" id="toast"></div>

<!-- ===== AUTH PAGE ===== -->
<div class="page active" id="authPage">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="title">🎰 LUCKY SPIN</div>
      <div class="sub">CASINO ONLINE</div>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">เข้าสู่ระบบ</button>
      <button class="tab-btn" onclick="switchTab('signup')">สมัครสมาชิก</button>
    </div>

    <!-- LOGIN -->
    <div class="auth-form active" id="loginForm">
      <div class="form-group">
        <label class="form-label">ชื่อผู้ใช้</label>
        <input class="form-input" id="loginUser" type="text" placeholder="กรอกชื่อผู้ใช้">
      </div>
      <div class="form-group">
        <label class="form-label">รหัสผ่าน</label>
        <input class="form-input" id="loginPass" type="password" placeholder="กรอกรหัสผ่าน">
      </div>
      <button class="auth-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
      <div class="auth-error" id="loginError"></div>
    </div>

    <!-- SIGNUP -->
    <div class="auth-form" id="signupForm">
      <div class="form-group">
        <label class="form-label">ชื่อผู้ใช้</label>
        <input class="form-input" id="regUser" type="text" placeholder="ตั้งชื่อผู้ใช้">
      </div>
      <div class="form-group">
        <label class="form-label">อีเมล</label>
        <input class="form-input" id="regEmail" type="email" placeholder="อีเมลของคุณ">
      </div>
      <div class="form-group">
        <label class="form-label">รหัสผ่าน</label>
        <input class="form-input" id="regPass" type="password" placeholder="ตั้งรหัสผ่าน (อย่างน้อย 6 ตัว)">
      </div>
      <div class="form-group">
        <label class="form-label">ยืนยันรหัสผ่าน</label>
        <input class="form-input" id="regPass2" type="password" placeholder="กรอกรหัสผ่านอีกครั้ง">
      </div>
      <button class="auth-btn" onclick="doSignup()">สมัครสมาชิก</button>
      <div class="auth-error" id="signupError"></div>
    </div>
  </div>
</div>

<!-- ===== GAME PAGE ===== -->
<div class="page" id="gamePage" style="flex-direction:column;">

  <div class="navbar">
    <div class="nav-logo">🎰 LUCKY</div>
    <div class="nav-center">
      <button class="nav-btn active" id="navSlot" onclick="showPanel('slot')">🎰 เกม</button>
      <button class="nav-btn" id="navTopup" onclick="showPanel('topup')">💰 เติมเงิน</button>
    </div>
    <div class="nav-right">
      <div class="nav-coins">
        <span class="coin-icon">🪙</span>
        <span class="coin-val" id="navCoins">0</span>
      </div>
      <button class="logout-btn" onclick="doLogout()">ออก</button>
    </div>
  </div>

  <!-- SLOT PANEL -->
  <div class="panel active" id="panelSlot">
    <div class="machine-title">🎰 LUCKY SPIN</div>
    <div class="machine-body">
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">เหรียญ</span>
          <span class="stat-value" id="coinDisplay">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">ชนะรวม</span>
          <span class="stat-value" id="wonDisplay">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">รอบ</span>
          <span class="stat-value" id="spinDisplay">0</span>
        </div>
      </div>

      <div class="message-area">
        <div class="slot-message" id="slotMsg">กดหมุนเพื่อเริ่ม! 🎰</div>
      </div>

      <div class="reels-container">
        <div class="win-line"></div>
        <div class="reel"><div class="reel-inner" id="inner0"></div><div class="reel-overlay-top"></div><div class="reel-overlay-bottom"></div></div>
        <div class="reel"><div class="reel-inner" id="inner1"></div><div class="reel-overlay-top"></div><div class="reel-overlay-bottom"></div></div>
        <div class="reel"><div class="reel-inner" id="inner2"></div><div class="reel-overlay-top"></div><div class="reel-overlay-bottom"></div></div>
      </div>

      <div class="bet-row">
        <span class="bet-label">เดิมพัน:</span>
        <button class="bet-btn" id="betDown">−</button>
        <span class="bet-display" id="betDisplay">10</span>
        <button class="bet-btn" id="betUp">+</button>
      </div>

      <button class="spin-btn" id="spinBtn">▶ SPIN</button>
    </div>

    <div class="paytable">
      <div class="paytable-title">ตารางรางวัล (3 เหมือน)</div>
      <div class="paytable-grid" id="paytable"></div>
    </div>
  </div>

  <!-- TOPUP PANEL -->
  <div class="panel" id="panelTopup">

    <div class="topup-card">
      <h3>💳 เติมเหรียญ</h3>

      <div class="form-group">
        <label class="form-label">จำนวนเงิน (บาท)</label>
        <div class="amount-input-wrap">
          <span class="amount-prefix">฿</span>
          <input class="amount-input" id="topupAmount" type="number" min="1" placeholder="กรอกจำนวนเงิน" oninput="updateQR()">
        </div>
      </div>

      <div class="qr-section" id="qrSection" style="display:none;">
        <div class="qr-label">สแกน PromptPay เพื่อชำระเงิน</div>
        <div class="qr-box">
          <canvas id="qrCanvas" width="180" height="180"></canvas>
        </div>
        <div class="qr-amount" id="qrAmountText">฿0</div>
        <div class="promptpay-info">PromptPay: 0xx-xxx-xxxx</div>
      </div>

      <button class="confirm-btn" id="confirmTopup" onclick="doTopup()" disabled>
        ✓ ยืนยันการเติมเงิน
      </button>
    </div>

    <div class="topup-card">
      <h3>📋 ประวัติการเติมเงิน</h3>
      <div class="history-list" id="historyList">
        <div class="empty-history">ยังไม่มีประวัติการเติมเงิน</div>
      </div>
    </div>

  </div>

</div>

<!-- QR.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>
// ===== DATA STORE =====
let users = JSON.parse(localStorage.getItem('lu_users') || '{}');
let currentUser = null;
let gameState = { coins: 0, won: 0, spins: 0 };
let bet = 10;
let spinning = false;
let reelPools = [[], [], []];

const SYMBOLS = [
  { sym: '🍒', name: 'cherry', mult: 3 },
  { sym: '🍋', name: 'lemon', mult: 4 },
  { sym: '🍇', name: 'grape', mult: 5 },
  { sym: '🔔', name: 'bell', mult: 8 },
  { sym: '⭐', name: 'star', mult: 10 },
  { sym: '💎', name: 'diamond', mult: 15 },
  { sym: '7️⃣', name: 'seven', mult: 25 },
];
const WEIGHTS = [30, 25, 20, 12, 7, 4, 2];

function saveUsers() {
  localStorage.setItem('lu_users', JSON.stringify(users));
}

// ===== AUTH =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
  document.getElementById('loginError').textContent = '';
  document.getElementById('signupError').textContent = '';
}

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (!u || !p) { document.getElementById('loginError').textContent = 'กรุณากรอกข้อมูลให้ครบ'; return; }
  if (!users[u]) { document.getElementById('loginError').textContent = 'ไม่พบชื่อผู้ใช้นี้'; return; }
  if (users[u].password !== p) { document.getElementById('loginError').textContent = 'รหัสผ่านไม่ถูกต้อง'; return; }
  loginSuccess(u);
}

function doSignup() {
  const u = document.getElementById('regUser').value.trim();
  const e = document.getElementById('regEmail').value.trim();
  const p = document.getElementById('regPass').value;
  const p2 = document.getElementById('regPass2').value;
  const err = document.getElementById('signupError');
  if (!u || !e || !p || !p2) { err.textContent = 'กรุณากรอกข้อมูลให้ครบ'; return; }
  if (users[u]) { err.textContent = 'ชื่อผู้ใช้นี้ถูกใช้แล้ว'; return; }
  if (p.length < 6) { err.textContent = 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'; return; }
  if (p !== p2) { err.textContent = 'รหัสผ่านไม่ตรงกัน'; return; }
  users[u] = { password: p, email: e, coins: 100, won: 0, spins: 0, history: [] };
  saveUsers();
  showToast('สมัครสมาชิกสำเร็จ! รับเหรียญฟรี 100 🎁');
  loginSuccess(u);
}

function loginSuccess(u) {
  currentUser = u;
  gameState.coins = users[u].coins;
  gameState.won = users[u].won || 0;
  gameState.spins = users[u].spins || 0;
  document.getElementById('authPage').classList.remove('active');
  document.getElementById('gamePage').classList.add('active');
  updateUI();
  initReels();
  renderPaytable();
  renderHistory();
}

function doLogout() {
  saveGameState();
  currentUser = null;
  document.getElementById('gamePage').classList.remove('active');
  document.getElementById('authPage').classList.add('active');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

function saveGameState() {
  if (!currentUser) return;
  users[currentUser].coins = gameState.coins;
  users[currentUser].won = gameState.won;
  users[currentUser].spins = gameState.spins;
  saveUsers();
}

function updateUI() {
  document.getElementById('coinDisplay').textContent = gameState.coins.toLocaleString();
  document.getElementById('wonDisplay').textContent = gameState.won.toLocaleString();
  document.getElementById('spinDisplay').textContent = gameState.spins;
  document.getElementById('navCoins').textContent = gameState.coins.toLocaleString();
}

// ===== PANELS =====
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  document.getElementById('nav' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
}

// ===== TOPUP =====
function updateQR() {
  const amt = parseInt(document.getElementById('topupAmount').value) || 0;
  const btn = document.getElementById('confirmTopup');
  const qrSection = document.getElementById('qrSection');

  if (amt >= 1) {
    qrSection.style.display = 'block';
    document.getElementById('qrAmountText').textContent = '฿' + amt.toLocaleString();
    btn.disabled = false;
    generateQR(amt);
  } else {
    qrSection.style.display = 'none';
    btn.disabled = true;
  }
}

function generateQR(amount) {
  try {
    const promptpayNumber = '0812345678';
    const amountStr = amount.toFixed(2);
    const payload = buildPromptPayPayload(promptpayNumber, amountStr);
    new QRious({
      element: document.getElementById('qrCanvas'),
      value: payload,
      size: 180,
      background: 'white',
      foreground: '#1a237e',
      level: 'M'
    });
  } catch(e) {
    // fallback plain QR
    new QRious({
      element: document.getElementById('qrCanvas'),
      value: 'PromptPay:0812345678:' + amount,
      size: 180, background: 'white', foreground: '#333', level: 'M'
    });
  }
}

function buildPromptPayPayload(phone, amount) {
  const cleanPhone = phone.replace(/-/g,'');
  const phoneFormatted = '0066' + cleanPhone.slice(1);
  const merchantInfo = '0016A000000677010111' + '0113' + phoneFormatted;
  const merchantInfoField = '29' + pad(merchantInfo.length) + merchantInfo;
  const amountField = '54' + pad(amount.length) + amount;
  const raw = '000201' + merchantInfoField + '5303764' + amountField + '5802TH6304';
  const crc = crc16(raw);
  return raw + crc;
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function crc16(str) {
  let crc = 0xFFFF;
  for (let i = 0; i < str.length; i++) {
    crc ^= str.charCodeAt(i) << 8;
    for (let j = 0; j < 8; j++) {
      crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
    }
  }
  crc &= 0xFFFF;
  return crc.toString(16).toUpperCase().padStart(4, '0');
}

function doTopup() {
  const amt = parseInt(document.getElementById('topupAmount').value) || 0;
  if (amt < 1) return;
  const coins = amt * 10;
  gameState.coins += coins;
  if (!users[currentUser].history) users[currentUser].history = [];
  users[currentUser].history.unshift({
    type: 'เติมเงิน',
    amount: amt,
    coins: coins,
    date: new Date().toLocaleString('th-TH')
  });
  saveGameState();
  updateUI();
  renderHistory();
  document.getElementById('topupAmount').value = '';
  document.getElementById('qrSection').style.display = 'none';
  document.getElementById('confirmTopup').disabled = true;
  showToast('เติมเงินสำเร็จ! +' + coins.toLocaleString() + ' เหรียญ 🎉');
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const history = users[currentUser]?.history || [];
  if (history.length === 0) {
    list.innerHTML = '<div class="empty-history">ยังไม่มีประวัติการเติมเงิน</div>';
    return;
  }
  list.innerHTML = history.slice(0, 20).map(h => `
    <div class="history-item">
      <div class="history-left">
        <div class="h-type">${h.type} — +${h.coins.toLocaleString()} เหรียญ</div>
        <div class="h-date">${h.date}</div>
      </div>
      <div class="history-right plus">+฿${h.amount.toLocaleString()}</div>
    </div>
  `).join('');
}

// ===== SLOT ENGINE =====
function weightedRandom() {
  const total = WEIGHTS.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < WEIGHTS.length; i++) { r -= WEIGHTS[i]; if (r <= 0) return i; }
  return WEIGHTS.length - 1;
}

function buildReelWithResult(reelIdx, targetSymIdx) {
  const inner = document.getElementById('inner' + reelIdx);
  inner.innerHTML = '';
  const pool = [];
  for (let i = 0; i < 2; i++) pool.push(SYMBOLS[weightedRandom()]);
  pool.push(SYMBOLS[targetSymIdx]);
  for (let i = 0; i < 17; i++) pool.push(SYMBOLS[weightedRandom()]);
  pool.forEach(s => {
    const div = document.createElement('div');
    div.className = 'symbol';
    div.textContent = s.sym;
    inner.appendChild(div);
  });
  inner.style.transition = 'none';
  inner.style.transform = 'translateY(-40px)';
  reelPools[reelIdx] = pool;
  return pool;
}

function initReels() {
  for (let i = 0; i < 3; i++) buildReelWithResult(i, weightedRandom());
}

async function spinReel(reelIdx, duration, finalSymIdx) {
  return new Promise(resolve => {
    const inner = document.getElementById('inner' + reelIdx);
    const totalItems = reelPools[reelIdx].length;
    const SH = 40, RH = 120;
    const targetPos = (RH / 2) - (SH / 2) - (finalSymIdx * SH);
    const totalH = totalItems * SH;
    let startTime = null;
    function animate(ts) {
      if (!startTime) startTime = ts;
      const progress = Math.min((ts - startTime) / duration, 1);
      if (progress < 0.85) {
        const p = progress / 0.85;
        const pos = -(p * totalH * 2);
        const wrapped = ((pos % totalH) + totalH) % totalH - totalH;
        inner.style.transition = 'none';
        inner.style.transform = `translateY(${wrapped}px)`;
      } else {
        const eased = 1 - Math.pow(1 - (progress - 0.85) / 0.15, 3);
        const cur = parseFloat(inner.style.transform.replace('translateY(','').replace('px)','')) || 0;
        inner.style.transition = 'none';
        inner.style.transform = `translateY(${cur + (targetPos - cur) * eased}px)`;
      }
      if (progress < 1) requestAnimationFrame(animate);
      else {
        inner.style.transition = 'transform 0.15s cubic-bezier(0.34,1.56,0.64,1)';
        inner.style.transform = `translateY(${targetPos}px)`;
        setTimeout(resolve, 150);
      }
    }
    requestAnimationFrame(animate);
  });
}

async function doSpin() {
  if (spinning) return;
  if (gameState.coins < bet) { setSlotMsg('เหรียญไม่พอ! 💰 กดเติมเงิน', 'lose'); return; }
  spinning = true;
  gameState.coins -= bet;
  gameState.spins++;
  updateUI();
  document.getElementById('spinBtn').disabled = true;
  setSlotMsg('กำลังหมุน...', '');
  const results = [weightedRandom(), weightedRandom(), weightedRandom()];
  reelPools = [buildReelWithResult(0, results[0]), buildReelWithResult(1, results[1]), buildReelWithResult(2, results[2])];
  const promises = results.map((symIdx, i) => new Promise(resolve => setTimeout(() => spinReel(i, 700 + i * 300, 2).then(resolve), i * 100)));
  await Promise.all(promises);
  evaluateResult(results.map(i => SYMBOLS[i]));
  saveGameState();
  spinning = false;
  document.getElementById('spinBtn').disabled = false;
}

function evaluateResult(syms) {
  const allSame = syms[0].name === syms[1].name && syms[1].name === syms[2].name;
  const twoSame = syms[0].name === syms[1].name || syms[1].name === syms[2].name || syms[0].name === syms[2].name;
  if (allSame) {
    const win = bet * syms[0].mult;
    gameState.coins += win;
    gameState.won += win;
    updateUI();
    if (syms[0].name === 'seven') setSlotMsg('🎉 JACKPOT! +' + win + ' เหรียญ!', 'jackpot');
    else setSlotMsg('✨ ชนะ! +' + win + ' เหรียญ (x' + syms[0].mult + ')', 'win');
    flashWin();
  } else if (twoSame) {
    gameState.coins += bet;
    gameState.won += bet;
    updateUI();
    setSlotMsg('👍 2 เหมือน! คืนเดิมพัน', 'win');
  } else {
    setSlotMsg('เกือบแล้ว... ลองอีกครั้ง', 'lose');
  }
  if (gameState.coins <= 0) {
    setTimeout(() => { gameState.coins = 50; updateUI(); setSlotMsg('หมดเหรียญ! รับโบนัส 50 🎁', 'win'); saveGameState(); }, 1500);
  }
}

function setSlotMsg(text, cls) {
  const el = document.getElementById('slotMsg');
  el.textContent = text;
  el.className = 'slot-message ' + cls;
}

function flashWin() {
  const f = document.getElementById('winFlash');
  f.style.opacity = '1';
  setTimeout(() => f.style.opacity = '0', 350);
  setTimeout(() => { f.style.opacity = '1'; setTimeout(() => f.style.opacity = '0', 280); }, 600);
}

function renderPaytable() {
  const grid = document.getElementById('paytable');
  grid.innerHTML = '';
  SYMBOLS.slice().reverse().forEach(s => {
    const div = document.createElement('div');
    div.className = 'pay-item';
    div.innerHTML = `<span class="pay-sym">${s.sym}</span><span class="pay-mult">x${s.mult}</span>`;
    grid.appendChild(div);
  });
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// BET CONTROLS
document.getElementById('betUp').addEventListener('click', () => {
  const opts = [5, 10, 25, 50, 100];
  const idx = opts.indexOf(bet);
  if (idx < opts.length - 1) { bet = opts[idx + 1]; document.getElementById('betDisplay').textContent = bet; }
});
document.getElementById('betDown').addEventListener('click', () => {
  const opts = [5, 10, 25, 50, 100];
  const idx = opts.indexOf(bet);
  if (idx > 0) { bet = opts[idx - 1]; document.getElementById('betDisplay').textContent = bet; }
});
document.getElementById('spinBtn').addEventListener('click', doSpin);

// ENTER KEY for auth
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('regPass2').addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });
</script>
</body>
